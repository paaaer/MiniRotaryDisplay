esphome:
  name: testroutaryencoder
  friendly_name: TestRoutaryEncoder
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%

substitutions:
  DIM_TIMEOUT_TICKS:   "150"   # 150 × 200ms = 30s
  SLEEP_TIMEOUT_TICKS: "300"   # 300 × 200ms = 60s
  PAGE0_TITLE: "FRIGGEBOD"
  PAGE1_TITLE: "TEMPERATURES"
  PAGE2_TITLE: "HOT WATER"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "pbjMGwv067T2eCrzDuOYoy41DwrDPAMoVmDKhhFfRIc="

ota:
  - platform: esphome
    password: !secret ota_rotaryencoder_1_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Testroutaryencoder"
    password: "aCo5cygdz5PB"

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  on_message:
    - topic: "home/heater/current_temp"
      then:
        - lambda: id(current_temp) = atof(x.c_str());
    - topic: "home/heater/heating_active"
      then:
        - lambda: id(heating_active) = (x == "true" || x == "1");
    - topic: "home/hotwater/temp"
      then:
        - lambda: id(hw_temp) = atof(x.c_str());
    - topic: "home/hotwater/minutes"
      then:
        - lambda: id(hw_minutes) = atof(x.c_str());
    - topic: "home/temperatures/outside"
      then:
        - lambda: id(outside_temp) = atof(x.c_str());
    - topic: "home/temperatures/inside"
      then:
        - lambda: id(inside_temp) = atof(x.c_str());

# ── SPI (VSPI) ────────────────────────────────────────────────────────
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

# ── Backlight PWM ─────────────────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO16
    id: bl_output
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Display Backlight"
    id: backlight
    output: bl_output
    default_transition_length: 400ms
    restore_mode: ALWAYS_ON

# ── Fonts ─────────────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 16
    glyphs: '°· !"%()+,=-./:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'
  - file: "gfonts://Roboto"
    id: font_small
    size: 22
    glyphs: '°· !"%()+,=-./:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'
  - file: "gfonts://Roboto"
    id: font_large
    size: 36
    glyphs: '0123456789.'
  - file: "gfonts://Roboto"
    id: font_xl
    size: 48
    glyphs: '0123456789.'
  - file: "gfonts://Roboto"
    id: font_xxl
    size: 70
    glyphs: '0123456789.'

# ── Globals ───────────────────────────────────────────────────────────
globals:
  - id: selected_control
    type: int
    initial_value: '0'
  - id: num_controls
    type: int
    initial_value: '3'
  - id: editing_mode
    type: bool
    initial_value: 'false'
  - id: target_temp
    type: float
    initial_value: '18.0'
  - id: current_temp
    type: float
    initial_value: '0.0'
  - id: heating_active
    type: bool
    initial_value: 'false'
  - id: hw_temp
    type: float
    initial_value: '58.0'
  - id: hw_minutes
    type: float
    initial_value: '45.0'
  - id: outside_temp
    type: float
    initial_value: '5.0'
  - id: inside_temp
    type: float
    initial_value: '21.0'
  - id: was_sleeping
    type: bool
    initial_value: 'false'
  - id: sleep_ticks
    type: int
    initial_value: '0'
  - id: enc_last_dir
    type: int
    initial_value: '0'   # 1=CW, -1=CCW, 0=none
  - id: enc_last_ms
    type: int
    initial_value: '0'

# ── Sleep/dim tick ────────────────────────────────────────────────────
interval:
  - interval: 200ms
    then:
      - lambda: |-
          id(sleep_ticks)++;
          bool dimmed  = id(sleep_ticks) >= $DIM_TIMEOUT_TICKS;
          bool sleeping= id(sleep_ticks) >= $SLEEP_TIMEOUT_TICKS;
          if (dimmed && !sleeping) {
            auto call = id(backlight).turn_on();
            call.set_brightness(0.15);
            call.set_transition_length(1000);
            call.perform();
          } else if (!dimmed) {
            auto call = id(backlight).turn_on();
            call.set_brightness(1.0);
            call.set_transition_length(0);
            call.perform();
          }

# ── Wake script ───────────────────────────────────────────────────────
script:
  - id: wake_screen
    then:
      - lambda: |-
          id(was_sleeping) = (id(sleep_ticks) >= $DIM_TIMEOUT_TICKS);
          id(sleep_ticks) = 0;
          if (id(was_sleeping)) {
            auto call = id(backlight).turn_on();
            call.set_brightness(1.0);
            call.set_transition_length(200);
            call.perform();
          }

# ── Display ───────────────────────────────────────────────────────────
display:
  - platform: mipi_spi
    model: ST7789V
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin: GPIO2
    invert_colors: true
    color_order: bgr
    data_rate: 20MHz
    rotation: 0°
    dimensions:
      height: 320
      width: 240
    update_interval: 50ms
    lambda: |-
      bool sleeping = id(sleep_ticks) >= $SLEEP_TIMEOUT_TICKS;

      if (sleeping) {
        it.fill(Color(0x02, 0x04, 0x0A));
        it.print(120, 152, id(font_tiny), Color(0x0D, 0x1A, 0x2A),
                 TextAlign::CENTER, "HEATER CONTROLLER");
        it.print(120, 168, id(font_tiny), Color(0x08, 0x12, 0x20),
                 TextAlign::CENTER, "-- push to wake --");
        return;
      }

      it.fill(Color(0x08, 0x0C, 0x14));

      // ── Color palette ─────────────────────────────────────────────
      const Color CARD      = Color(0x0C, 0x15, 0x20);
      const Color CARD_EDGE = Color(0x18, 0x30, 0x45);
      const Color TEXT_MAIN = Color(0xE0, 0xE6, 0xEE);
      const Color TEXT_DIM  = Color(0x6A, 0x80, 0x95);
      const Color ACCENT    = Color(0x4A, 0xB0, 0xE0);
      const Color GOOD      = Color(0x2A, 0x8A, 0x40);
      const Color WARN      = Color(0xCC, 0xAA, 0x20);
      const Color BAD       = Color(0xE0, 0x55, 0x20);

      // ── Screen indicator dots ──
      for (int i = 0; i < id(num_controls); i++) {
        Color pip = (i == id(selected_control))
          ? ACCENT : Color(0x18, 0x28, 0x40);
        it.filled_circle(116 + i * 10, 42, 3, pip);
      }

      char buf[16];
      Color status_col = id(heating_active) ? BAD : GOOD;

      if (id(selected_control) == 0) {
        // ── Screen 0: Friggebod thermostat ────────────────────────────

        // Top bar
        it.filled_rectangle(0, 0, 240, 34, CARD);
        it.print(10, 8, id(font_small), TEXT_DIM,
                 TextAlign::TOP_LEFT, "$PAGE0_TITLE");
        it.filled_circle(228, 17, 4, status_col);

        // Thermostat arc
        int cx = 120, cy = 148, R = 88;
        float minT = 5.0f, maxT = 35.0f;
        float frac = std::min(1.0f, std::max(0.0f,
                      (id(target_temp) - minT) / (maxT - minT)));
        float startA = M_PI * 0.75f;
        float arcSpan = M_PI * 1.5f;
        int segments = 50;

        // Background arc — solid 6px stroke via 6 radii
        for (int s = 0; s < segments - 1; s++) {
          float a1 = startA + arcSpan * s / (float)segments;
          float a2 = startA + arcSpan * (s + 1) / (float)segments;
          for (int r = R - 3; r <= R + 2; r++) {
            it.line(cx + (int)(r * cosf(a1)), cy + (int)(r * sinf(a1)),
                    cx + (int)(r * cosf(a2)), cy + (int)(r * sinf(a2)),
                    Color(0x05, 0x0A, 0x12));
          }
        }

        // Active arc — solid 6px stroke drawn on top
        Color arc_col = id(editing_mode) ? ACCENT : BAD;
        int end_seg = (int)(segments * frac);
        for (int s = 0; s < end_seg - 1; s++) {
          float a1 = startA + arcSpan * s / (float)segments;
          float a2 = startA + arcSpan * (s + 1) / (float)segments;
          for (int r = R - 3; r <= R + 2; r++) {
            it.line(cx + (int)(r * cosf(a1)), cy + (int)(r * sinf(a1)),
                    cx + (int)(r * cosf(a2)), cy + (int)(r * sinf(a2)),
                    arc_col);
          }
        }

        // Arc tip dot
        if (end_seg > 0 && end_seg < segments) {
          float a = startA + arcSpan * (end_seg - 0.5f) / (float)segments;
          int x = cx + (int)(R * cosf(a));
          int y = cy + (int)(R * sinf(a));
          it.filled_circle(x, y, 7, TEXT_MAIN);
        }

        // Current temperature
        snprintf(buf, sizeof(buf), "%.1f", id(current_temp));
        it.print(cx, cy - 10, id(font_xxl), TEXT_MAIN,
                 TextAlign::CENTER, buf);
        it.print(cx + 78, cy - 46, id(font_small), TEXT_DIM,
                 TextAlign::TOP_LEFT, "°C");

        // Target temperature
        snprintf(buf, sizeof(buf), "%.1f", id(target_temp));
        Color tgt_col = id(editing_mode) ? ACCENT : TEXT_DIM;
        it.print(cx, cy + 56, id(font_large), tgt_col,
                 TextAlign::CENTER, buf);

        // Status
        const char* status_txt = id(heating_active) ? "Heating" : "Idle";
        it.print(cx, cy + 90, id(font_small), status_col,
                 TextAlign::CENTER, status_txt);

        // Bottom hint
        if (id(editing_mode)) {
          it.print(cx, 308, id(font_tiny), ACCENT,
                   TextAlign::CENTER, "Rotate · Push = Save");
        } else {
          it.print(cx, 308, id(font_tiny), TEXT_DIM,
                   TextAlign::CENTER, "Push to edit");
        }

      } else if (id(selected_control) == 1) {
        // ── Screen 1: Temperatures ────────────────────────────────────

        // Top bar
        it.filled_rectangle(0, 0, 240, 34, CARD);
        it.print(10, 8, id(font_small), TEXT_DIM,
                 TextAlign::TOP_LEFT, "$PAGE1_TITLE");

        // Outside card
        it.filled_rectangle(12, 50, 216, 122, CARD);
        it.rectangle(12, 50, 216, 122, CARD_EDGE);
        it.print(24, 60, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_LEFT, "OUTSIDE");
        it.print(220, 60, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_RIGHT, "°C");
        snprintf(buf, sizeof(buf), "%.1f", id(outside_temp));
        it.print(120, 124, id(font_xxl), ACCENT, TextAlign::CENTER, buf);

        // Inside card
        it.filled_rectangle(12, 180, 216, 122, CARD);
        it.rectangle(12, 180, 216, 122, CARD_EDGE);
        it.print(24, 190, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_LEFT, "INSIDE");
        it.print(220, 190, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_RIGHT, "°C");
        snprintf(buf, sizeof(buf), "%.1f", id(inside_temp));
        it.print(120, 254, id(font_xxl), ACCENT, TextAlign::CENTER, buf);

        it.print(120, 313, id(font_tiny), TEXT_DIM,
                 TextAlign::CENTER, "Rotate to switch");

      } else {
        // ── Screen 2: Hot water ───────────────────────────────────────

        // Top bar
        it.filled_rectangle(0, 0, 240, 34, CARD);
        it.print(10, 8, id(font_small), TEXT_DIM,
                 TextAlign::TOP_LEFT, "$PAGE2_TITLE");

        // Temperature card
        it.filled_rectangle(12, 50, 216, 122, CARD);
        it.rectangle(12, 50, 216, 122, CARD_EDGE);
        it.print(24, 60, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_LEFT, "TEMPERATURE");
        it.print(220, 60, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_RIGHT, "°C");
        snprintf(buf, sizeof(buf), "%.1f", id(hw_temp));
        Color hw_col = id(hw_temp) >= 55.0f ? GOOD :
                       id(hw_temp) >= 40.0f ? WARN : BAD;
        it.print(120, 124, id(font_xxl), hw_col, TextAlign::CENTER, buf);

        // Minutes card
        it.filled_rectangle(12, 180, 216, 122, CARD);
        it.rectangle(12, 180, 216, 122, CARD_EDGE);
        it.print(24, 190, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_LEFT, "AVAILABLE");
        it.print(220, 190, id(font_tiny), TEXT_DIM,
                 TextAlign::TOP_RIGHT, "min");
        snprintf(buf, sizeof(buf), "%d", (int)id(hw_minutes));
        Color min_col = id(hw_minutes) >= 30.0f ? GOOD :
                        id(hw_minutes) >= 10.0f ? WARN : BAD;
        it.print(120, 254, id(font_xxl), min_col, TextAlign::CENTER, buf);

        it.print(120, 313, id(font_tiny), TEXT_DIM,
                 TextAlign::CENTER, "Rotate to switch");
      }

# ── Buttons ───────────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO26
      mode: INPUT_PULLUP
      inverted: true
    name: "Key0"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - script.execute: wake_screen

  - platform: gpio
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Push"
    filters:
      - delayed_on_off: 25ms
    on_press:
      then:
        - script.execute: wake_screen
        - lambda: |-
            if (id(was_sleeping)) return;
            if (id(selected_control) != 0) return;
            id(editing_mode) = !id(editing_mode);
            ESP_LOGI("main", "editing_mode = %s",
                     id(editing_mode) ? "true" : "false");
        - if:
            condition:
              lambda: 'return !id(editing_mode) && !id(was_sleeping) && id(selected_control) == 0;'
            then:
              - mqtt.publish:
                  topic: "home/heater/target_temp/set"
                  payload: !lambda |-
                    char b[8];
                    snprintf(b, sizeof(b), "%.1f", id(target_temp));
                    return std::string(b);

# ── Rotary encoder ────────────────────────────────────────────────────
sensor:
  - platform: rotary_encoder
    pin_a:
      number: GPIO32
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO33
      mode: INPUT_PULLUP
    name: "Rotary Encoder"
    resolution: 1
    on_clockwise:
      then:
        - script.execute: wake_screen
        - lambda: |-
            uint32_t now = millis();
            bool bounce = (id(enc_last_dir) == -1) &&
                          ((now - (uint32_t)id(enc_last_ms)) < 80U);
            id(enc_last_dir) = 1;
            id(enc_last_ms) = (int)now;
            if (bounce || id(was_sleeping)) return;
            if (id(editing_mode)) {
              switch (id(selected_control)) {
                case 0:
                  id(target_temp) = std::min(id(target_temp) + 0.5f, 30.0f);
                  break;
              }
            } else {
              id(editing_mode) = false;
              id(selected_control) = (id(selected_control) + 1) % id(num_controls);
            }
    on_anticlockwise:
      then:
        - script.execute: wake_screen
        - lambda: |-
            uint32_t now = millis();
            bool bounce = (id(enc_last_dir) == 1) &&
                          ((now - (uint32_t)id(enc_last_ms)) < 80U);
            id(enc_last_dir) = -1;
            id(enc_last_ms) = (int)now;
            if (bounce || id(was_sleeping)) return;
            if (id(editing_mode)) {
              switch (id(selected_control)) {
                case 0:
                  id(target_temp) = std::max(id(target_temp) - 0.5f, 5.0f);
                  break;
              }
            } else {
              id(editing_mode) = false;
              id(selected_control) = (id(selected_control) - 1 + id(num_controls)) % id(num_controls);
            }
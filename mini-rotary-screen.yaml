esphome:
  name: testroutaryencoder
  friendly_name: TestRoutaryEncoder
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 100%

substitutions:
  DIM_TIMEOUT_TICKS:   "150"   # 150 × 200ms = 30s
  SLEEP_TIMEOUT_TICKS: "300"   # 300 × 200ms = 60s

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "pbjMGwv067T2eCrzDuOYoy41DwrDPAMoVmDKhhFfRIc="

ota:
  - platform: esphome
    password: "a2e1e58fd5f2454c1dff558c30810ee4"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Testroutaryencoder"
    password: "aCo5cygdz5PB"

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  on_message:
    - topic: "home/heater/current_temp"
      then:
        - lambda: id(current_temp) = atof(x.c_str());
    - topic: "home/heater/heating_active"
      then:
        - lambda: id(heating_active) = (x == "true" || x == "1");

# ── SPI (VSPI) ────────────────────────────────────────────────────────
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

# ── Backlight PWM ─────────────────────────────────────────────────────
output:
  - platform: ledc
    pin: GPIO16
    id: bl_output
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Display Backlight"
    id: backlight
    output: bl_output
    default_transition_length: 400ms
    restore_mode: ALWAYS_ON

# ── Fonts ─────────────────────────────────────────────────────────────
font:
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 10
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_large
    size: 26
  - file: "gfonts://Roboto"
    id: font_xl
    size: 38

# ── Globals ───────────────────────────────────────────────────────────
globals:
  - id: selected_control
    type: int
    initial_value: '0'
  - id: num_controls
    type: int
    initial_value: '1'
  - id: editing_mode
    type: bool
    initial_value: 'false'
  - id: target_temp
    type: float
    initial_value: '21.0'
  - id: current_temp
    type: float
    initial_value: '0.0'
  - id: heating_active
    type: bool
    initial_value: 'false'
  - id: heater_mode
    type: int
    initial_value: '1'
  - id: sleep_ticks
    type: int
    initial_value: '0'

# ── Sleep/dim tick ────────────────────────────────────────────────────
interval:
  - interval: 200ms
    then:
      - lambda: |-
          id(sleep_ticks)++;
          bool dimmed  = id(sleep_ticks) >= $DIM_TIMEOUT_TICKS;
          bool sleeping= id(sleep_ticks) >= $SLEEP_TIMEOUT_TICKS;
          if (dimmed && !sleeping) {
            auto call = id(backlight).turn_on();
            call.set_brightness(0.15);
            call.set_transition_length(1000);
            call.perform();
          } else if (!dimmed) {
            auto call = id(backlight).turn_on();
            call.set_brightness(1.0);
            call.set_transition_length(0);
            call.perform();
          }

# ── Wake script ───────────────────────────────────────────────────────
script:
  - id: wake_screen
    then:
      - lambda: |-
          bool was_asleep = id(sleep_ticks) >= $DIM_TIMEOUT_TICKS;
          id(sleep_ticks) = 0;
          if (was_asleep) {
            auto call = id(backlight).turn_on();
            call.set_brightness(1.0);
            call.set_transition_length(200);
            call.perform();
          }

# ── Display ───────────────────────────────────────────────────────────
display:
  - platform: mipi_spi
    model: ST7789V
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin: GPIO2
    invert_colors: true
    color_order: bgr
    data_rate: 4MHz
    rotation: 90°
    dimensions:
      height: 240
      width: 320
    update_interval: 500ms
    lambda: |-
      bool sleeping = id(sleep_ticks) >= $SLEEP_TIMEOUT_TICKS;

      if (sleeping) {
        it.fill(Color(0x02, 0x04, 0x0A));
        it.print(160, 106, id(font_tiny), Color(0x0D, 0x1A, 0x2A),
                 TextAlign::CENTER, "HEATER CONTROLLER");
        it.print(160, 124, id(font_tiny), Color(0x08, 0x12, 0x20),
                 TextAlign::CENTER, "-- push any button to wake --");
        return;
      }

      it.fill(Color(0x08, 0x0C, 0x14));

      it.filled_rectangle(0, 0, 320, 26, Color(0x0C, 0x15, 0x20));
      it.print(8, 6, id(font_tiny), Color(0x3A, 0x50, 0x70),
               TextAlign::TOP_LEFT, "HEATER CONTROLLER");
      it.filled_circle(309, 13, 4, Color(0x20, 0x80, 0x40));

      int cx = 95, cy = 150, R = 72;
      float minT = 5.0f, maxT = 35.0f;
      float curFrac = std::min(1.0f, std::max(0.0f,
                       (id(current_temp) - minT) / (maxT - minT)));
      float tgtFrac = std::min(1.0f, std::max(0.0f,
                       (id(target_temp)  - minT) / (maxT - minT)));
      float startA = M_PI * 0.75f;
      float arcSpan = M_PI * 1.5f;
      int   segments = 60;

      for (int s = 0; s < segments; s++) {
        float a = startA + arcSpan * s / (float)segments;
        int tx = cx + (int)(R * cosf(a));
        int ty = cy + (int)(R * sinf(a));
        it.filled_circle(tx, ty, 4, Color(0x0F, 0x1E, 0x2E));
      }

      Color arc_col = id(heating_active)
        ? Color(0xE0, 0x55, 0x20) : Color(0x1A, 0x60, 0x90);
      int seg_end = (int)(segments * curFrac);
      for (int s = 0; s < seg_end; s++) {
        float a = startA + arcSpan * s / (float)segments;
        int tx = cx + (int)(R * cosf(a));
        int ty = cy + (int)(R * sinf(a));
        it.filled_circle(tx, ty, 4, arc_col);
      }

      float tgtA = startA + arcSpan * tgtFrac;
      Color tick_col = id(editing_mode)
        ? Color(0xFF, 0xAA, 0x00) : Color(0x44, 0xAA, 0xFF);
      for (int r = R - 12; r <= R + 10; r++) {
        it.filled_circle(
          cx + (int)(r * cosf(tgtA)),
          cy + (int)(r * sinf(tgtA)),
          2, tick_col);
      }

      if (id(heating_active))
        it.filled_circle(cx, cy - R + 10, 5, Color(0xE0, 0x55, 0x20));

      char buf[16];
      snprintf(buf, sizeof(buf), "%.1f", id(current_temp));
      Color temp_col = id(heating_active)
        ? Color(0xE0, 0x70, 0x40) : Color(0x4A, 0xB0, 0xE0);
      it.print(cx, cy - 12, id(font_xl),   temp_col,
               TextAlign::CENTER, buf);
      it.print(cx, cy + 22, id(font_tiny), Color(0x2A, 0x40, 0x60),
               TextAlign::CENTER, "current  \xB0""C");

      it.print(cx - R - 8, cy + 22, id(font_tiny),
               Color(0x1E, 0x34, 0x48), TextAlign::CENTER, "5");
      it.print(cx,          cy - R - 16, id(font_tiny),
               Color(0x1E, 0x34, 0x48), TextAlign::CENTER, "20");
      it.print(cx + R + 8,  cy + 22, id(font_tiny),
               Color(0x1E, 0x34, 0x48), TextAlign::CENTER, "35");

      int px = 196, pw = 118;

      Color tgt_bg  = id(editing_mode)
        ? Color(0x1A, 0x10, 0x00) : Color(0x0C, 0x15, 0x20);
      Color tgt_bdr = id(editing_mode)
        ? Color(0xFF, 0x88, 0x00) : Color(0x0E, 0x25, 0x35);
      it.filled_rectangle(px, 30, pw, 58, tgt_bg);
      it.rectangle(px, 30, pw, 58, tgt_bdr);
      it.print(px + 8, 34, id(font_tiny), Color(0x2A, 0x40, 0x60),
               TextAlign::TOP_LEFT, "TARGET");
      snprintf(buf, sizeof(buf), "%.1f", id(target_temp));
      Color tgt_val_col = id(editing_mode)
        ? Color(0xFF, 0xAA, 0x00) : Color(0xDD, 0xDD, 0xEE);
      it.print(px + 8,  52, id(font_large), tgt_val_col,
               TextAlign::TOP_LEFT, buf);
      it.print(px + 96, 52, id(font_small), Color(0x2A, 0x40, 0x60),
               TextAlign::TOP_LEFT, "\xB0""C");
      if (id(editing_mode)) {
        it.print(px + 8, 76, id(font_tiny), Color(0xAA, 0x66, 0x00),
                 TextAlign::TOP_LEFT, "< rot  click=save >");
      } else {
        it.print(px + 8, 76, id(font_tiny), Color(0x1A, 0x3A, 0x5A),
                 TextAlign::TOP_LEFT, "click to edit");
      }

      const char* mode_labels[] = {"OFF", "ECO", "COMFORT"};
      Color mode_bg[]  = {Color(0x2A,0x10,0x10),
                          Color(0x0A,0x1F,0x12),
                          Color(0x0A,0x0E,0x20)};
      Color mode_txt[] = {Color(0xAA,0x30,0x30),
                          Color(0x2A,0x8A,0x40),
                          Color(0x30,0x60,0xCC)};
      it.filled_rectangle(px, 94, pw, 36, mode_bg[id(heater_mode)]);
      it.rectangle(px, 94, pw, 36, Color(0x0E, 0x25, 0x35));
      it.print(px + 8,  98, id(font_tiny),  Color(0x2A,0x40,0x60),
               TextAlign::TOP_LEFT, "MODE");
      it.print(px + 8, 110, id(font_small), mode_txt[id(heater_mode)],
               TextAlign::TOP_LEFT, mode_labels[id(heater_mode)]);

      it.filled_rectangle(px, 136, pw, 36, Color(0x0C,0x15,0x20));
      it.rectangle(px, 136, pw, 36, Color(0x0E,0x25,0x35));
      it.print(px + 8, 140, id(font_tiny), Color(0x2A,0x40,0x60),
               TextAlign::TOP_LEFT, "STATUS");
      const char* status_str;
      Color status_col;
      if (id(heating_active)) {
        status_str = "HEATING";   status_col = Color(0xE0,0x55,0x20);
      } else if (id(current_temp) >= id(target_temp) - 0.2f) {
        status_str = "AT TARGET"; status_col = Color(0x2A,0x8A,0x40);
      } else {
        status_str = "IDLE";      status_col = Color(0x2A,0x40,0x60);
      }
      it.print(px + 8, 152, id(font_small), status_col,
               TextAlign::TOP_LEFT, status_str);

      it.filled_rectangle(px, 178, pw, 36, Color(0x0C,0x15,0x20));
      it.rectangle(px, 178, pw, 36, Color(0x0E,0x25,0x35));
      it.print(px + 8, 182, id(font_tiny), Color(0x2A,0x40,0x60),
               TextAlign::TOP_LEFT, "DELTA");
      float delta = id(target_temp) - id(current_temp);
      snprintf(buf, sizeof(buf), "%+.1f \xB0""C", delta);
      Color delta_col = delta > 0.5f
        ? Color(0xE0,0x70,0x40) : Color(0x2A,0x8A,0x60);
      it.print(px + 8, 194, id(font_small), delta_col,
               TextAlign::TOP_LEFT, buf);

      it.filled_rectangle(0, 226, 320, 14, Color(0x06,0x0B,0x12));
      it.print(8,   228, id(font_tiny), Color(0x1A,0x30,0x50),
               TextAlign::TOP_LEFT,  "KEY0 next");
      it.print(312, 228, id(font_tiny), Color(0x1A,0x30,0x50),
               TextAlign::TOP_RIGHT, "ENC push=edit/save");

# ── Buttons ───────────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO26
      mode: INPUT_PULLUP
      inverted: true
    name: "Key0"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - script.execute: wake_screen
        - lambda: |-
            if (id(sleep_ticks) != 0) return;
            if (!id(editing_mode))
              id(selected_control) = (id(selected_control) + 1) % id(num_controls);

  - platform: gpio
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Push"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - script.execute: wake_screen
        - lambda: |-
            if (id(sleep_ticks) != 0) return;
            id(editing_mode) = !id(editing_mode);
            ESP_LOGI("main", "editing_mode = %s",
                     id(editing_mode) ? "true" : "false");
        - if:
            condition:
              lambda: 'return !id(editing_mode) && id(sleep_ticks) == 0;'
            then:
              - mqtt.publish:
                  topic: "home/heater/target_temp/set"
                  payload: !lambda |-
                    char b[8];
                    snprintf(b, sizeof(b), "%.1f", id(target_temp));
                    return std::string(b);

# ── Rotary encoder ────────────────────────────────────────────────────
sensor:
  - platform: rotary_encoder
    pin_a:
      number: GPIO32
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO33
      mode: INPUT_PULLUP
    name: "Rotary Encoder"
    resolution: 2
    on_clockwise:
      then:
        - script.execute: wake_screen
        - lambda: |-
            if (!id(editing_mode)) return;
            ESP_LOGI("main", "CW target=%.1f", id(target_temp));
            switch (id(selected_control)) {
              case 0:
                id(target_temp) = std::min(id(target_temp) + 0.5f, 30.0f);
                break;
            }
    on_anticlockwise:
      then:
        - script.execute: wake_screen
        - lambda: |-
            if (!id(editing_mode)) return;
            ESP_LOGI("main", "CCW target=%.1f", id(target_temp));
            switch (id(selected_control)) {
              case 0:
                id(target_temp) = std::max(id(target_temp) - 0.5f, 5.0f);
                break;
            }